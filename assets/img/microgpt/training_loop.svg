<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <style>
      .step { fill: #fff; stroke: #333; stroke-width: 2; rx: 10; ry: 10; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Step 1: Forward -->
  <rect x="50" y="70" width="100" height="60" class="step" />
  <text x="100" y="95" class="text">Forward Pass</text>
  <text x="100" y="115" class="text" font-size="10">(Compute Loss)</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="100" x2="200" y2="100" class="arrow" />

  <!-- Step 2: Backward -->
  <rect x="200" y="70" width="100" height="60" class="step" />
  <text x="250" y="95" class="text">Backward Pass</text>
  <text x="250" y="115" class="text" font-size="10">(Compute Grads)</text>

  <!-- Arrow 2 -->
  <line x1="300" y1="100" x2="350" y2="100" class="arrow" />

  <!-- Step 3: Optimization -->
  <rect x="350" y="70" width="100" height="60" class="step" />
  <text x="400" y="95" class="text">Optimizer Step</text>
  <text x="400" y="115" class="text" font-size="10">(Update Weights)</text>

  <!-- Arrow 3 (Loop) -->
  <path d="M 400 130 Q 400 180 250 180 Q 100 180 100 130" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
  <text x="250" y="170" class="text">Repeat Sequence</text>
</svg>
