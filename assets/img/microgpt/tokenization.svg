<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <style>
      .box { fill: #f0f4f8; stroke: #333; stroke-width: 2; rx: 5; ry: 5; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: 'Courier New', monospace; font-size: 16px; fill: #333; }
      .label { font-family: sans-serif; font-size: 14px; fill: #666; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Input -->
  <rect x="50" y="80" width="100" height="40" class="box" />
  <text x="100" y="105" class="text" text-anchor="middle">"emma"</text>
  <text x="100" y="70" class="label">Input Text</text>

  <!-- Arrow 1 -->
  <line x1="150" y1="100" x2="200" y2="100" class="arrow" />

  <!-- Tokenizer Mapping -->
  <rect x="200" y="50" width="120" height="100" class="box" />
  <text x="260" y="80" class="text" text-anchor="middle">'e' -> 5</text>
  <text x="260" y="100" class="text" text-anchor="middle">'m' -> 13</text>
  <text x="260" y="120" class="text" text-anchor="middle">'a' -> 1</text>
  <text x="260" y="40" class="label">Tokenizer (stoi)</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="100" x2="370" y2="100" class="arrow" />

  <!-- Integers -->
  <rect x="370" y="80" width="180" height="40" class="box" />
  <text x="460" y="105" class="text" text-anchor="middle">[5, 13, 13, 1]</text>
  <text x="460" y="70" class="label">Token IDs</text>
</svg>
