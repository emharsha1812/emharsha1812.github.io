<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 300">
  <defs>
    <style>
      .node { fill: #fff; stroke: #333; stroke-width: 2; rx: 10; ry: 10; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 5, 5; stroke: #e74c3c; stroke-width: 2; marker-end: url(#arrowhead-red); }
      .text { font-family: sans-serif; font-size: 16px; fill: #333; text-anchor: middle; }
      .label { font-size: 14px; fill: #666; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e74c3c" />
    </marker>
  </defs>

  <!-- Nodes -->
  <rect x="50" y="50" width="100" height="50" class="node" />
  <text x="100" y="80" class="text">Value(a)</text>

  <rect x="50" y="200" width="100" height="50" class="node" />
  <text x="100" y="230" class="text">Value(b)</text>

  <rect x="300" y="125" width="100" height="50" class="node" />
  <text x="350" y="155" class="text">Value(c)</text>

  <!-- Forward Arrows -->
  <line x1="150" y1="75" x2="300" y2="150" class="arrow" />
  <line x1="150" y1="225" x2="300" y2="150" class="arrow" />
  <text x="240" y="110" class="label" transform="rotate(25, 240, 110)">+</text>

  <!-- Backward Arrows (Gradients) -->
  <path d="M 320 125 Q 250 50 130 50" class="dashed" fill="none"/>
  <text x="220" y="60" class="label" fill="#e74c3c">backward()</text>
  
  <path d="M 320 175 Q 250 250 130 250" class="dashed" fill="none"/>
</svg>
