<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 450">
  <defs>
    <style>
      .box { fill: #f0f4f8; stroke: #333; stroke-width: 2; rx: 5; ry: 5; }
      .op { fill: #fff; stroke: #333; stroke-width: 2; rx: 15; ry: 15; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .text { font-family: sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
      .label { font-family: sans-serif; font-size: 12px; fill: #666; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Input X -->
  <rect x="300" y="20" width="100" height="30" class="box" />
  <text x="350" y="40" class="text">Input (x)</text>

  <!-- Q, K, V Projections -->
  <line x1="350" y1="50" x2="150" y2="80" class="arrow" />
  <line x1="350" y1="50" x2="350" y2="80" class="arrow" />
  <line x1="350" y1="50" x2="550" y2="80" class="arrow" />

  <rect x="100" y="80" width="100" height="40" class="box" fill="#e3f2fd" />
  <text x="150" y="105" class="text">Query (Q)</text>
  <text x="150" y="135" class="label">"What I look for"</text>

  <rect x="300" y="80" width="100" height="40" class="box" fill="#fff3e0" />
  <text x="350" y="105" class="text">Key (K)</text>
  <text x="350" y="135" class="label">"What I define"</text>

  <rect x="500" y="80" width="100" height="40" class="box" fill="#e8f5e9" />
  <text x="550" y="105" class="text">Value (V)</text>
  <text x="550" y="135" class="label">"What I offer"</text>

  <!-- Q * K^T -->
  <circle cx="250" cy="180" r="20" class="op" />
  <text x="250" y="185" class="text" font-weight="bold">×</text>
  <text x="250" y="215" class="label">MatMul</text>

  <line x1="150" y1="120" x2="235" y2="170" class="arrow" />
  <line x1="350" y1="120" x2="265" y2="170" class="arrow" />

  <!-- Scale & Softmax -->
  <rect x="200" y="230" width="100" height="30" class="box" />
  <text x="250" y="250" class="text">Scale (/√d)</text>
  <line x1="250" y1="200" x2="250" y2="230" class="arrow" />

  <rect x="200" y="280" width="100" height="30" class="box" />
  <text x="250" y="300" class="text">Softmax</text>
  <line x1="250" y1="260" x2="250" y2="280" class="arrow" />

  <!-- Weights * V -->
  <circle cx="350" cy="350" r="20" class="op" />
  <text x="350" y="355" class="text" font-weight="bold">×</text>
  <text x="400" y="355" class="label">Weighted Sum</text>

  <line x1="250" y1="310" x2="335" y2="340" class="arrow" /> <!-- From Softmax -->
  <line x1="550" y1="120" x2="365" y2="340" class="arrow" /> <!-- From V -->

  <!-- Output -->
  <rect x="300" y="400" width="100" height="30" class="box" />
  <text x="350" y="420" class="text">Output</text>
  <line x1="350" y1="370" x2="350" y2="400" class="arrow" />

</svg>
