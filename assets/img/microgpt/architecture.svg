<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600">
  <defs>
    <style>
      .box { fill: #f8f9fa; stroke: #333; stroke-width: 2; rx: 5; ry: 5; }
      .arrow { stroke: #333; stroke-width: 2; marker-end: url(#arrowhead); }
      .plus { font-size: 20px; fill: #333; text-anchor: middle; font-weight: bold; }
      .text { font-family: sans-serif; font-size: 14px; fill: #333; text-anchor: middle; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
    </marker>
  </defs>

  <!-- Inputs -->
  <text x="80" y="30" class="text">Input ID</text>
  <text x="320" y="30" class="text">Pos ID</text>

  <!-- Embeddings -->
  <rect x="30" y="50" width="100" height="40" class="box" />
  <text x="80" y="75" class="text">Token Emb</text>

  <rect x="270" y="50" width="100" height="40" class="box" />
  <text x="320" y="75" class="text">Pos Emb</text>

  <!-- Addition -->
  <circle cx="200" cy="120" r="15" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="200" y="127" class="plus">+</text>

  <line x1="80" y1="90" x2="185" y2="120" class="arrow" />
  <line x1="320" y1="90" x2="215" y2="120" class="arrow" />

  <!-- Transformer Block -->
  <rect x="100" y="150" width="200" height="350" fill="none" stroke="#666" stroke-dasharray="5,5" />
  <text x="320" y="170" class="text" fill="#666">Layer 0</text>

  <!-- RMSNorm 1 -->
  <rect x="150" y="170" width="100" height="30" class="box" />
  <text x="200" y="190" class="text">RMSNorm</text>
  <line x1="200" y1="135" x2="200" y2="170" class="arrow" />

  <!-- Attention -->
  <rect x="150" y="220" width="100" height="40" class="box" fill="#e8f4fd" />
  <text x="200" y="245" class="text">Attention</text>
  <line x1="200" y1="200" x2="200" y2="220" class="arrow" />

  <!-- Residual 1 -->
  <path d="M 200 145 C 80 145 80 280 185 280" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <circle cx="200" cy="280" r="10" fill="#fff" stroke="#333" />
  <text x="200" y="285" class="plus" font-size="14">+</text>
  <line x1="200" y1="260" x2="200" y2="270" class="arrow" />

  <!-- RMSNorm 2 -->
  <rect x="150" y="310" width="100" height="30" class="box" />
  <text x="200" y="330" class="text">RMSNorm</text>
  <line x1="200" y1="290" x2="200" y2="310" class="arrow" />

  <!-- MLP -->
  <rect x="150" y="360" width="100" height="40" class="box" fill="#e8f4fd" />
  <text x="200" y="385" class="text">MLP</text>
  <line x1="200" y1="340" x2="200" y2="360" class="arrow" />

  <!-- Residual 2 -->
  <path d="M 200 290 C 80 290 80 420 185 420" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)" />
  <circle cx="200" cy="420" r="10" fill="#fff" stroke="#333" />
  <text x="200" y="425" class="plus" font-size="14">+</text>
  <line x1="200" y1="400" x2="200" y2="410" class="arrow" />

  <!-- Linear Head -->
  <rect x="130" y="460" width="140" height="40" class="box" />
  <text x="200" y="485" class="text">Linear Head</text>
  <line x1="200" y1="430" x2="200" y2="460" class="arrow" />

  <!-- Output -->
  <text x="200" y="540" class="text">Logits</text>
  <line x1="200" y1="500" x2="200" y2="525" class="arrow" />
</svg>
